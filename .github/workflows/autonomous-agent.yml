# .github/workflows/autonomous-agent.yml
# CI workflow for BlackRoad Salesforce Agent

name: Autonomous Repo Agent

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  autonomous-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Validate source imports
        run: |
          python -c "from src import SalesforceAgent, SalesforceClient, BulkClient, TaskQueue"

      - name: Report Status
        if: always()
        run: |
          echo "Autonomous agent completed"
          echo "Repo: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
